apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: default
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      containers:
        - image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          name: {{ .Chart.Name }}
          resources:
            limits:
              cpu: 50m
              memory: 100Mi
            requests:
              cpu: 50m
              memory: 100Mi
          ports:
            - containerPort: 8080
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              port: 8080
              path: /healthcheck
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          env:
            - name: APP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kuber-practice-app-secrets
                  key: api_key
            - name: APP_PORT
              valueFrom:
                configMapKeyRef:
                  name: kuber-practice-app-service-config
                  key: PORT
            - name: APP_DB_USER
              valueFrom:
                configMapKeyRef:
                  name: kuber-practice-app-service-config
                  key: POSTGRES_USER
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kuber-practice-app-secrets
                  key: postgres_password
            - name: APP_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: kuber-practice-app-service-config
                  key: POSTGRES_HOST
            - name: APP_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: kuber-practice-app-service-config
                  key: POSTGRES_PORT
            - name: APP_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: kuber-practice-app-service-config
                  key: POSTGRES_DB
            - name: APP_DB_MIGRATIONS_DIRECTORY
              valueFrom:
                configMapKeyRef:
                  name: kuber-practice-app-service-config
                  key: MIGRATIONS_DIRECTORY
            - name: APP_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: kuber-practice-app-service-config
                  key: REDIS_HOST
            - name: APP_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kuber-practice-app-secrets
                  key: redis_password